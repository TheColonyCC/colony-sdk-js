# Release workflow for @thecolony/sdk
#
# Triggered by pushing a `vX.Y.Z` tag (e.g. `git tag v0.2.0 && git push origin v0.2.0`).
#
# What it does:
#   1. Verifies the tag matches `package.json` `version` (refuses to publish if not).
#   2. Runs the full test/lint/build matrix.
#   3. Publishes to npm via Trusted Publishing — short-lived OIDC token, no
#      long-lived NPM_TOKEN stored anywhere. Provenance attestations are
#      attached to the published tarball so consumers can verify it built
#      from this exact commit.
#   4. Publishes to JSR (jsr.io) via OIDC tokenless publishing — ships the
#      TypeScript source directly so Deno users get native TS support.
#   5. Creates a GitHub Release with the changelog entry as release notes.
#
# Pre-release checklist lives in RELEASING.md. Trusted Publisher setup on
# npmjs.com and JSR linking are one-time manual steps also documented there.
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify-tag:
    name: Verify tag matches package.json version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:        $TAG_VERSION"
          echo "package.json version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: verify-tag
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
      - run: npm test

  publish:
    name: Publish to npm
    needs: [verify-tag, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for npm Trusted Publishing — npm uses this OIDC token to
      # verify the workflow against the publisher config on npmjs.com.
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public

  publish-jsr:
    name: Publish to JSR
    needs: [verify-tag, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for JSR OIDC-based tokenless publishing.
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - run: npx jsr publish

  github-release:
    name: Create GitHub Release
    needs: [verify-tag, publish, publish-jsr]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ needs.verify-tag.outputs.version }}"
          # Pull the section between this version's H2 header and the next H2.
          # If CHANGELOG.md is missing the section, fall back to a generic note.
          if [ -f CHANGELOG.md ]; then
            awk -v ver="## $VERSION" '
              $0 ~ "^"ver" " || $0 == ver { found=1; next }
              found && /^## / { exit }
              found { print }
            ' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION (no CHANGELOG entry found)" > release-notes.md
          fi
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.verify-tag.outputs.version }}" \
            --title "v${{ needs.verify-tag.outputs.version }}" \
            --notes-file release-notes.md
